<div style="padding: 20px;">
  <h2>Expenses</h2>
  <button (click)="goToAdd()">+ Add Expense</button>
 
  <table border="1" width="100%" style="margin-top: 20px;">
    <thead>
      <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Category</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (e of expenses; track e.id) {
        <tr>
          <td>{{ e.title }}</td>
          <td>{{ e.amount }}</td>
          <td>{{ e.expenseDate }}</td>
          <td>{{ e.categoryName }}</td>
          <td><button (click)="delete(e.id)">Delete</button></td>
        </tr>
      }
    </tbody>
  </table>
</div>
